<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaderboard - Banana Math 🍌</title>
    <link rel="stylesheet" href="design.css">
</head>

<body class="scores-page">

    <div class="menu-container">

        <h1>🏆 Leaderboard</h1>

        <table class="leaderboard-table" style="width: 100%; margin: 20px 0; text-align: center;">
            <thead>
                <tr>
                    <th>Rank</th>
                    <th>Name</th>
                    <th>Score</th>
                </tr>
            </thead>
            <tbody id="leaderboard-body">
            </tbody>
        </table>

        <div style="margin-top:1rem; display: flex; gap: 0.75rem; justify-content: center; flex-wrap: wrap;">
            <a href="game.html" class="btn btn-play">🎮 Play Now</a>
            <button class="btn btn-secondary" onclick="clearLeaderboard()">🗑️ Clear Leaderboard</button>
        </div>
        <br>
        <a href="index.html" class="btn btn-secondary">⬅ Back to Menu</a>
    </div>

    <script src="script.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", loadLeaderboard);
    </script>
</body>
</html>
