<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaderboard - Banana Math 🍌</title>
    <link rel="stylesheet" href="design.css">
</head>

<body class="scores-page">

    <div class="menu-container">

        <h1>🏆 Leaderboard</h1>

        <div class="player-input">
            <label>Enter Player Name</label>
            <input id="player-name" type="text" placeholder="Your name">
            <button class="btn btn-secondary" onclick="savePlayer()">Save Name</button>
        </div>

        <table class="leaderboard-table" style="width: 100%; margin: 20px 0; text-align: center;">
            <thead>
                <tr>
                    <th>Rank</th>
                    <th>Name</th>
                    <th>Score</th>
                </tr>
            </thead>
            <tbody id="leaderboard-body">
            </tbody>
        </table>

        <div style="margin-top:1rem;">
            <button class="btn btn-secondary" onclick="clearLeaderboard()">🗑️ Clear Leaderboard</button>
        </div>
        <br>
        <a href="index.html" class="btn btn-secondary">⬅ Back to Menu</a>
    </div>

    <script src="script.js"></script>
    <script>
        function savePlayer(){
            const name = document.getElementById("player-name").value || "Player";
            localStorage.setItem("banana_player", name);
            alert("Player name saved! It will be used automatically next time.");
        }

        document.addEventListener("DOMContentLoaded", loadLeaderboard);
    </script>
</body>
</html>
